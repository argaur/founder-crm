name: Deploy landing/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate dashboard config.js (no secrets — public API URL + bot link only)
        run: |
          cat > landing/dashboard/config.js <<'EOF'
          const API_BASE_URL = 'https://founder-crm-bot-production.up.railway.app';
          const BOT_LINK     = 'https://t.me/RethinkCRMbot';
          const REFRESH_MS   = 5 * 60 * 1000;
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - id: deployment
        uses: actions/deploy-pages@v4
